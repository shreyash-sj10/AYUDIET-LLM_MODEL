<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AYUDIET</title>
    <style>
      :root {
        --primary-purple: #6c63ff;
        --primary-blue: #4a90e2;
        --bg: #fafbfc;
        --text: #1f2937;
        --muted: #6b7280;
        --assistant-bg: #f5f7fa;
        --border: #e7ebf1;
        --surface: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: radial-gradient(circle at 20% 0%, #eef2ff 0%, var(--bg) 45%);
        color: var(--text);
      }

      .app {
        max-width: 780px;
        margin: 0 auto;
        padding: 28px 18px 20px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: start;
      }

      .title {
        font-size: 28px;
        margin: 0;
        letter-spacing: 0.08em;
        font-weight: 800;
      }

      .subtitle {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      .icon-btn {
        border: 1px solid var(--border);
        background: var(--surface);
        border-radius: 12px;
        width: 42px;
        height: 42px;
        cursor: pointer;
        font-size: 18px;
        transition: all 0.2s ease;
      }

      .icon-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 18px rgba(17, 24, 39, 0.08);
      }

      .chat-shell {
        background: var(--surface);
        border-radius: 20px;
        border: 1px solid var(--border);
        box-shadow: 0 16px 30px rgba(31, 41, 55, 0.06);
        display: flex;
        flex-direction: column;
        min-height: 72vh;
        overflow: hidden;
      }

      .status {
        margin: 14px 16px 0;
        padding: 10px 12px;
        border-radius: 10px;
        font-weight: 600;
        display: none;
      }

      .status.connected {
        display: block;
        color: #166534;
        background: #dcfce7;
      }

      .status.error {
        display: block;
        color: #991b1b;
        background: #fee2e2;
      }

      .status.loading {
        display: block;
        color: #1e3a8a;
        background: #dbeafe;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 18px 16px 12px;
      }

      .empty-state {
        height: 100%;
        display: grid;
        place-items: center;
        color: #475569;
        text-align: center;
        padding: 24px;
        line-height: 1.5;
      }

      .message-row {
        display: flex;
        gap: 10px;
        margin: 12px 0;
        align-items: flex-end;
        animation: fadeInUp 0.24s ease;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 14px;
        flex-shrink: 0;
      }

      .avatar.assistant {
        background: #edf7ef;
      }

      .avatar.user {
        background: #e8edff;
        color: #4338ca;
        font-weight: 700;
      }

      .bubble {
        max-width: 82%;
        border-radius: 20px;
        padding: 12px 14px;
        line-height: 1.5;
        font-size: 15px;
      }

      .bubble.assistant {
        background: var(--assistant-bg);
        border: 1px solid #e6ebf3;
        color: var(--text);
      }

      .bubble.user {
        background: linear-gradient(135deg, var(--primary-purple), var(--primary-blue));
        color: #fff;
      }

      .bubble p {
        margin: 0 0 10px;
      }

      .bubble p:last-child {
        margin-bottom: 0;
      }

      .bubble ul {
        margin: 6px 0 0;
        padding-left: 18px;
      }

      .typing {
        display: none;
        margin: 0 16px 8px;
        color: #4b5563;
        font-size: 14px;
        align-items: center;
        gap: 8px;
      }

      .typing.show {
        display: flex;
      }

      .dots {
        display: inline-flex;
        gap: 4px;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #6b7280;
        animation: bounce 1.2s infinite ease-in-out;
      }

      .dot:nth-child(2) { animation-delay: 0.12s; }
      .dot:nth-child(3) { animation-delay: 0.24s; }

      .composer-wrap {
        padding: 10px 12px 14px;
        border-top: 1px solid #f0f3f8;
        background: linear-gradient(180deg, rgba(250, 251, 252, 0.4), rgba(250, 251, 252, 0.95));
        position: sticky;
        bottom: 0;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-bottom: 10px;
      }

      .chip {
        border: 1px solid #e4e9f1;
        background: #f8faff;
        color: #334155;
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .chip:hover {
        border-color: #cfd8e6;
        transform: translateY(-1px);
      }

      .composer {
        background: #fff;
        border: 1px solid #e5eaf3;
        border-radius: 999px;
        padding: 6px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        box-shadow: 0 10px 24px rgba(31, 41, 55, 0.08);
        transition: box-shadow 0.2s ease, border-color 0.2s ease;
      }

      .composer:focus-within {
        border-color: #c9d4f0;
        box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.12), 0 10px 24px rgba(31, 41, 55, 0.08);
      }

      .composer input {
        border: 0;
        outline: 0;
        padding: 10px 12px;
        font-size: 15px;
        color: var(--text);
        background: transparent;
      }

      .send-btn {
        border: 0;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, var(--primary-purple), var(--primary-blue));
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .send-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 16px rgba(74, 144, 226, 0.35);
      }

      .send-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: none;
      }

      .modal-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.35);
        place-items: center;
        padding: 16px;
      }

      .modal-backdrop.show {
        display: grid;
      }

      .modal {
        width: 100%;
        max-width: 460px;
        background: #fff;
        border-radius: 16px;
        border: 1px solid #e5eaf3;
        box-shadow: 0 18px 36px rgba(17, 24, 39, 0.24);
        padding: 16px;
      }

      .modal h3 {
        margin: 0 0 12px;
      }

      .modal .field {
        display: grid;
        gap: 6px;
      }

      .modal input {
        width: 100%;
        border: 1px solid #dbe3f0;
        border-radius: 10px;
        padding: 10px;
      }

      .modal-actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-top: 14px;
      }

      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes bounce {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.6; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <h1 class="title">AYUDIET</h1>
          <p class="subtitle">Your intelligent diet assistant</p>
        </div>
        <button class="icon-btn" id="openSettings" title="Settings" aria-label="Settings">⚙️</button>
      </header>

      <section class="chat-shell">
        <div id="status" class="status"></div>
        <div id="chatMessages" class="messages">
          <div class="empty-state" id="emptyState">
            <div>
              <div style="font-size: 22px; margin-bottom: 6px">Hi, I’m your Ayurvedic assistant 🌿</div>
              <div>Ask me anything about your health, diet, or dosha.</div>
            </div>
          </div>
        </div>

        <div id="typingIndicator" class="typing">
          <span>Thinking</span>
          <span class="dots">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </span>
        </div>

        <div class="composer-wrap">
          <div class="chips">
            <button class="chip" onclick="setSuggestion('Why was this meal chosen?')">Why was this meal chosen?</button>
            <button class="chip" onclick="setSuggestion('Explain my dosha')">Explain my dosha</button>
            <button class="chip" onclick="setSuggestion('I feel bloated today')">I feel bloated today</button>
          </div>
          <div class="composer">
            <input
              id="messageInput"
              type="text"
              placeholder="Ask about Ayurveda, your symptoms, or your diet plan..."
              onkeypress="handleKeyPress(event)"
            />
            <button id="sendButton" class="send-btn" onclick="sendMessage()" aria-label="Send">
              ➤
            </button>
          </div>
        </div>
      </section>
    </main>

    <div id="settingsModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="modal">
        <h3 id="settingsTitle">Connection Settings</h3>
        <div class="field">
          <label for="apiUrl">API Base URL</label>
          <input id="apiUrl" type="text" placeholder="http://127.0.0.1:8011" />
        </div>
        <div class="modal-actions">
          <button class="chip" onclick="closeSettings()">Close</button>
          <button class="chip" onclick="testConnection()">Test Connection</button>
        </div>
      </div>
    </div>

    <script>
      let isConnected = false;
      let sessionId = "session_" + Math.random().toString(36).slice(2, 10);

      document.addEventListener("DOMContentLoaded", function () {
        document.getElementById("apiUrl").value = window.location.origin;
        testConnection();
        bindModal();
      });

      function bindModal() {
        const modal = document.getElementById("settingsModal");
        const openBtn = document.getElementById("openSettings");
        openBtn.addEventListener("click", () => modal.classList.add("show"));
        modal.addEventListener("click", (e) => {
          if (e.target === modal) modal.classList.remove("show");
        });
      }

      function closeSettings() {
        document.getElementById("settingsModal").classList.remove("show");
      }

      function getApiUrl() {
        const raw = (document.getElementById("apiUrl").value || "").trim();
        return raw || window.location.origin;
      }

      function showStatus(message, type) {
        const el = document.getElementById("status");
        el.textContent = message;
        el.className = `status ${type}`;
      }

      async function testConnection() {
        showStatus("Checking API connection...", "loading");
        try {
          const res = await fetch(`${getApiUrl()}/health`);
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || "Could not connect");
          isConnected = true;
          showStatus("Connected", "connected");
        } catch (err) {
          isConnected = false;
          showStatus(`Connection failed: ${err.message}`, "error");
        }
      }

      function setSuggestion(text) {
        const input = document.getElementById("messageInput");
        input.value = text;
        input.focus();
      }

      function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
      }

      function escapeHtml(text) {
        return String(text)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function formatAssistantText(text) {
        const safe = escapeHtml(text || "");
        const lines = safe.split("\n");
        let html = "";
        let inList = false;

        for (const line of lines) {
          const trimmed = line.trim();
          const isBullet = trimmed.startsWith("•") || trimmed.startsWith("- ");
          if (isBullet) {
            if (!inList) {
              html += "<ul>";
              inList = true;
            }
            const item = trimmed.replace(/^•\s?/, "").replace(/^- /, "");
            html += `<li>${item}</li>`;
          } else {
            if (inList) {
              html += "</ul>";
              inList = false;
            }
            if (trimmed) {
              html += `<p>${trimmed.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")}</p>`;
            }
          }
        }
        if (inList) html += "</ul>";
        return html || "<p></p>";
      }

      function appendMessage(text, role) {
        const list = document.getElementById("chatMessages");
        const empty = document.getElementById("emptyState");
        if (empty) empty.remove();

        const row = document.createElement("div");
        row.className = `message-row ${role}`;

        const avatar = document.createElement("div");
        avatar.className = `avatar ${role === "user" ? "user" : "assistant"}`;
        avatar.textContent = role === "user" ? "U" : "🌿";

        const bubble = document.createElement("div");
        bubble.className = `bubble ${role === "user" ? "user" : "assistant"}`;
        bubble.innerHTML = role === "assistant" ? formatAssistantText(text) : escapeHtml(text);

        if (role === "user") {
          row.appendChild(bubble);
          row.appendChild(avatar);
        } else {
          row.appendChild(avatar);
          row.appendChild(bubble);
        }
        list.appendChild(row);
        list.scrollTop = list.scrollHeight;
      }

      function setTyping(show) {
        document.getElementById("typingIndicator").classList.toggle("show", show);
      }

      async function sendMessage() {
        const input = document.getElementById("messageInput");
        const send = document.getElementById("sendButton");
        const query = input.value.trim();
        if (!query) return;

        if (!isConnected) {
          showStatus("Connect API from settings first.", "error");
          return;
        }

        appendMessage(query, "user");
        input.value = "";
        setTyping(true);
        send.disabled = true;

        try {
          const res = await fetch(`${getApiUrl()}/ai/rag`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, session_id: sessionId }),
          });
          const data = await res.json();
          if (res.ok && data && data.success) {
            let text = (data.data && data.data.text) || "No response.";
            if (data.meta && data.meta.fallback) {
              text += `\n\n**Note:** ${data.meta.reason || "fallback"}`;
            }
            appendMessage(text, "assistant");
          } else {
            appendMessage(`I hit an error: ${(data && data.error) || "Unknown error"}`, "assistant");
          }
        } catch (err) {
          appendMessage(`Connection error: ${err.message}`, "assistant");
        } finally {
          setTyping(false);
          send.disabled = false;
        }
      }
    </script>
  </body>
</html>
